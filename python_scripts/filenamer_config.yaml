# Filenamer Configuration File

# LLM Settings
#model: "mistral-nemo"
model: "llama3.1"
temperature: 0
max_characters: 128000

# File Processing Settings
duplicate_index_limit: 99

# Prompt Template
prompt: |
  The following is the contents of a PDF document. Please read it and find:
  - the company name
  - the subject (or "Betreff")
  - the date (if mentioned in the document)

  >>>
  {pdf}
  <<<

  Now we will construct a new name for the document, according to the following format:

  IF A DATE IS FOUND:
  'YYYY-MM-DD_COMPANY-SUBJECT.pdf'

  IF NO DATE IS FOUND:
  'COMPANY-SUBJECT.pdf'

  IMPORTANT FILENAME REQUIREMENTS:
  1. Use hyphens (-) between words in company names and subjects
  2. Use underscores (_) between the date and company, and if needed for clarity
  3. Do NOT include any spaces in the filename
  4. Avoid special characters except for hyphens and underscores
  5. Use dots (.) only for abbreviations, not before the .pdf extension
  6. Keep company names concise, abbreviate if very long
  7. If no date is found, omit the date prefix entirely
  8. Avoid ALL-CAPS-NAMES except for acronyms

  {examples}

  If the doc is in English, use English terms. Wenn das Dokument auf Deutsch ist, dann verwende Deutsche Begriffe.

  As a reply to this prompt, please be short and concise, and only reply with the file name.

# Example filenames for reference
example_filenames:
  - "2020-02-28_GLS-Kontoauszug.pdf"
  - "2025-03-03_degiro-Kauf-EQQQ-9.pdf"
  - "2024-07-29_TradeRepublic_Ueberweisungsbestaetigung.pdf"
  - "2018-04-18_Protokoll-Eigentümerversammlung.pdf"
  - "2025-12-30_Teilnahmbescheinigung-Mongolei.pdf"
  - "2025-09-21_Beitrittserklärung-SK-Wedding.pdf"
  - "2025-01-07_Vodafone-Kabel-Rechnung-Januar.pdf"
  - "2025-12-31_DKB-Giro-Kontoauszug.pdf"
  - "2026-01-01_TradeRepublic-Abrechnung-Saveback.pdf"
